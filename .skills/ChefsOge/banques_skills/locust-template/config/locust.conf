# Fichier de configuration par défaut pour les tests Locust
# Ces paramètres seront appliqués automatiquement si vous lancez sans arguments.

# Fichier de scénario de test par défaut
locustfile = scenarios/basic_test.py

# Hôte cible par défaut (remplacez-le par votre URL locale ou staging)
host = http://localhost:3000

# Nombre d'utilisateurs simulés par défaut
users = 10

# Taux d'apparition des utilisateurs par seconde
spawn-rate = 2

# Durée d'exécution du test (ex: 5m pour 5 minutes, ou commentez pour tourner indéfiniment)
# run-time = 5m
