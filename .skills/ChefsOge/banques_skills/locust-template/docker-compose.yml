version: '3'

services:
  master:
    build: .
    ports:
      - "8089:8089"
    volumes:
      - .:/app
    command: -f scenarios/basic_test.py --master --host http://target-app:3000

  worker:
    build: .
    volumes:
      - .:/app
    command: -f scenarios/basic_test.py --worker --master-host master
    depends_on:
      - master
